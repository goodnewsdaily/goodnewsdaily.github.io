<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#388E3C"/>
    </linearGradient>
  </defs>
  <!-- Green circle background -->
  <circle cx="50" cy="50" r="46" fill="url(#bg)"/>
  <!-- Megaphone body - yellow -->
  <path d="M22,38 L42,28 L70,16 L70,72 L42,60 L22,50 Z" fill="#FFF176"/>
  <!-- Megaphone rim / bell -->
  <ellipse cx="70" cy="44" rx="4" ry="28" fill="#FFD54F"/>
  <!-- Megaphone mouthpiece -->
  <ellipse cx="22" cy="44" rx="3" ry="6" fill="#FFD54F"/>
  <!-- Megaphone handle -->
  <rect x="30" y="52" width="8" height="18" rx="3" fill="#FFD54F"/>
  <!-- Sound waves -->
  <path d="M78,34 C84,37 84,51 78,54" stroke="#FFF176" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M84,27 C93,33 93,55 84,61" stroke="#FFF176" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M90,21 C100,29 100,59 90,67" stroke="#FFF176" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
</svg>
