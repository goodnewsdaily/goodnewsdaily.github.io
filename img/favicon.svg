<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#0077BE"/>
    </linearGradient>
  </defs>
  <!-- Circle background: sunrise sky -->
  <circle cx="50" cy="50" r="48" fill="url(#sky)"/>
  <!-- Ocean -->
  <path d="M2,65 Q25,60 50,65 Q75,70 98,65 L98,98 Q50,98 2,98 Z" fill="#0077BE" opacity="0.7"/>
  <path d="M2,70 Q30,66 55,70 Q80,74 98,70 L98,98 Q50,98 2,98 Z" fill="#005A8E" opacity="0.5"/>
  <!-- Sun rising -->
  <circle cx="50" cy="52" r="14" fill="#FFD700"/>
  <circle cx="50" cy="52" r="14" fill="#FFF8DC" opacity="0.4"/>
  <!-- Sun rays -->
  <g stroke="#FFD700" stroke-width="1.5" opacity="0.6">
    <line x1="50" y1="33" x2="50" y2="28"/>
    <line x1="62" y1="36" x2="66" y2="32"/>
    <line x1="69" y1="46" x2="74" y2="44"/>
    <line x1="38" y1="36" x2="34" y2="32"/>
    <line x1="31" y1="46" x2="26" y2="44"/>
  </g>
  <!-- Beach / sand -->
  <path d="M2,80 Q20,75 40,78 Q60,82 98,77 L98,98 Q50,98 2,98 Z" fill="#F4D03F" opacity="0.6"/>
  <!-- Palm tree trunk -->
  <path d="M75,85 Q73,70 70,55 Q69,50 71,48" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Palm leaves -->
  <path d="M71,48 Q60,38 48,42" stroke="#228B22" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M71,48 Q63,35 55,33" stroke="#2E8B57" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M71,48 Q78,36 85,38" stroke="#228B22" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M71,48 Q82,40 90,44" stroke="#2E8B57" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M71,48 Q68,35 62,30" stroke="#32CD32" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M71,48 Q80,33 82,30" stroke="#32CD32" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
