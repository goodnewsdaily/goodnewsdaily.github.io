<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="60%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#005A8E"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="50" cy="50" r="46"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="46" fill="url(#sky)"/>
  <g clip-path="url(#circle)">
    <!-- Sun: half circle rising from horizon -->
    <circle cx="50" cy="62" r="18" fill="#fff" opacity="0.9"/>
    <circle cx="50" cy="62" r="15" fill="#FFD700"/>
    <!-- Sun glow -->
    <circle cx="50" cy="62" r="24" fill="#FFD700" opacity="0.15"/>
    <!-- Ocean -->
    <rect x="0" y="62" width="100" height="40" fill="#005A8E" opacity="0.85"/>
    <!-- Waves -->
    <path d="M0,66 Q12,62 25,66 Q38,70 50,66 Q62,62 75,66 Q88,70 100,66 L100,72 Q88,68 75,72 Q62,76 50,72 Q38,68 25,72 Q12,76 0,72 Z" fill="#0077BE" opacity="0.5"/>
    <!-- Palm silhouette -->
    <path d="M78,95 Q76,78 74,65 Q73,58 75,54" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Palm fronds - elegant curves -->
    <path d="M75,54 C68,46 58,44 50,48" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M75,54 C70,43 62,38 56,38" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M75,54 C80,44 88,42 92,46" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M75,54 C82,46 90,46 95,50" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M75,54 C73,42 68,36 64,34" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M75,54 C80,42 84,36 86,34" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Subtle border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#005A8E" stroke-width="1.5" opacity="0.3"/>
</svg>
